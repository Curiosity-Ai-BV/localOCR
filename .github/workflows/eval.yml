name: Build and Evaluate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13" ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints.txt -r requirements.txt
          python -m pip install -c constraints.txt -r requirements-dev.txt

      - name: Run checks
        run: make check

  evaluate:
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints.txt -r requirements.txt
          python -m pip install -c constraints.txt -r requirements-dev.txt

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama Server
        run: |
          ollama serve > ollama.log 2>&1 &
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ollama.log
          exit 1

      - name: Pull Vision Model
        run: |
          ollama pull granite3.2-vision

      - name: Run automated evaluation
        env:
          EVAL_MODEL: granite3.2-vision
          EVAL_MAX_IMAGES: 2
          LOCALOCR_REQUEST_TIMEOUT: 360
        run: python evaluate.py --fail-on-errors
