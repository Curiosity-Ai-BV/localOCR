name: Build and Evaluate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: Install Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        
    - name: Start Ollama Server
      run: |
        ollama serve &
        # Wait for ollama to be ready
        sleep 5
        
    - name: Pull Vision Model
      run: |
        # Using a smaller model (granite3.2-vision) for CI to avoid memory limits and timeouts on standard standard runners
        ollama pull granite3.2-vision
        
    - name: Run automated evaluation
      env:
        EVAL_MODEL: granite3.2-vision
        EVAL_MAX_IMAGES: 2
      run: |
        python evaluate.py
